<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Climate Dashboard</title>
https://cdn.jsdelivr.net/npm/chart.js
<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
header { background:#1f3c88; color:#fff; padding:20px; text-align:center; }
.controls { padding:15px; text-align:center; }
.container { display:grid; grid-template-columns: repeat(2, 1fr); gap:20px; padding:20px; }
.card { background:#fff; padding:15px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
.stats { display:flex; justify-content:space-around; margin-top:10px; }
.stat-box { background:#fff; padding:10px 20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);} 
canvas { width:100% !important; height:280px !important; }
</style>
</head>
<body>
<header>
<h1>🌍 Advanced Climate Change Dashboard</h1>
<p>Interactive Monitoring of Key Climate Indicators</p>
</header>

<div class="controls">
<label>Select Dataset: </label>
<select id="datasetSelect" onchange="updateCharts()">
<option value="global">Global</option>
<option value="india">India</option>
</select>

<button onclick="toggleTheme()">Toggle Dark Mode</button>
</div>

<div class="stats">
<div class="stat-box">Temp Rise: <span id="tempStat">1.15°C</span></div>
<div class="stat-box">CO₂: <span id="co2Stat">425 ppm</span></div>
<div class="stat-box">Sea Level: <span id="seaStat">90 mm</span></div>
</div>

<div class="container">
<div class="card"><canvas id="tempChart"></canvas></div>
<div class="card"><canvas id="co2Chart"></canvas></div>
<div class="card"><canvas id="seaChart"></canvas></div>
<div class="card"><canvas id="iceChart"></canvas></div>
</div>

<script>
let darkMode = false;
const datasets = {
  global: {
    temp: [0.42,0.48,0.62,0.87,1.02,1.15],
    co2: [370,380,395,410,420,425],
    sea: [20,30,45,60,75,90],
    ice: [6.5,6.2,5.8,5.4,5.0,4.7]
  },
  india: {
    temp: [0.30,0.35,0.50,0.70,0.90,1.05],
    co2: [360,370,390,405,415,420],
    sea: [15,22,35,50,65,80],
    ice: [6.2,6.0,5.7,5.3,4.9,4.5]
  }
};

const years = ['2000','2005','2010','2015','2020','2025'];
let charts = {};

function createChart(id, type, data, color) {
  return new Chart(document.getElementById(id), {
    type: type,
    data: {
      labels: years,
      datasets: [{ data: data, borderColor: color, backgroundColor: color, fill:false }]
    }
  });
}

function initCharts() {
  charts.temp = createChart('tempChart','line',datasets.global.temp,'red');
  charts.co2 = createChart('co2Chart','line',datasets.global.co2,'green');
  charts.sea = createChart('seaChart','bar',datasets.global.sea,'blue');
  charts.ice = createChart('iceChart','line',datasets.global.ice,'purple');
}

function updateCharts() {
  const selected = document.getElementById('datasetSelect').value;
  const d = datasets[selected];
  charts.temp.data.datasets[0].data = d.temp;
  charts.co2.data.datasets[0].data = d.co2;
  charts.sea.data.datasets[0].data = d.sea;
  charts.ice.data.datasets[0].data = d.ice;
  charts.temp.update(); charts.co2.update(); charts.sea.update(); charts.ice.update();

  document.getElementById('tempStat').innerText = d.temp.slice(-1)[0] + '°C';
  document.getElementById('co2Stat').innerText = d.co2.slice(-1)[0] + ' ppm';
  document.getElementById('seaStat').innerText = d.sea.slice(-1)[0] + ' mm';
}

function toggleTheme() {
  darkMode = !darkMode;
  document.body.style.background = darkMode ? '#111' : '#eef2f7';
  document.body.style.color = darkMode ? '#fff' : '#000';
}

initCharts();
</script>
</body>
</html>
