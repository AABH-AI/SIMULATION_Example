name: Update manifest and Deploy Pages

on:
  push:
    paths:
      - '**/*.html'
      - 'manifest.json'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update manifest.json with HTML contents
        run: node scripts/updateManifest.js

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then echo "No changes to commit"; else git commit -m "chore: update manifest with HTML contents" && git push; fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          token: ${{ secrets.GITHUB_TOKEN }}
