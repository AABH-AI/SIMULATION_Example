<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Your UI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%);
      color: #f8f9fa;
    }

    .container {
      width: min(600px, 90%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-top: 0;
      font-size: 2.1rem;
      color: #f1faee;
    }

    p {
      color: #e9ecef;
      line-height: 1.6;
    }

    .options {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.18);
      color: #1d3557;
      background: #a8dadc;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.22);
    }

    .footer {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #ced4da;
    }

    .status {
      margin-top: 18px;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      color: #f1faee;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .latest-card {
      margin-top: 18px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      color: #f8f9fa;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .latest-card button {
      width: auto;
      margin-top: 12px;
      background: #f1faee;
      color: #1d3557;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Choose a UI to view</h1>
    <p>Pick the interface you want to load. The page will open the selected UI in the same browser tab.</p>

    <div class="status" id="publishInfo"></div>
    <div class="latest-card" id="latestUI" style="display:none"></div>

    <div class="options" id="uiOptions">
      <!-- Dynamically populated from manifest.json -->
    </div>

    <div class="footer">
      <p>To add a new mockup: Create a .html file and add it to the repository; the workflow will update <code>manifest.json</code> automatically.</p>
    </div>
  </div>

  <script>
    function openUI(path) {
      window.location.href = path;
    }

    function formatDateTime(iso) {
      try {
        const date = new Date(iso);
        return date.toLocaleString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false,
          timeZoneName: 'short'
        });
      } catch (err) {
        return iso;
      }
    }

    function buildLabel(file) {
      return file.replace(/\.html$/i, '').replace(/[_-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderPublishInfo(data) {
      const publishInfo = document.getElementById('publishInfo');
      if (data.pagesPublishedAt) {
        publishInfo.innerHTML = `<strong>Published to GitHub Pages:</strong> ${formatDateTime(data.pagesPublishedAt)}`;
      } else {
        publishInfo.innerHTML = '<strong>No GitHub Pages publish timestamp available yet.</strong>';
      }
    }

    function renderLatestUI(data) {
      const latestContainer = document.getElementById('latestUI');
      const autoPages = data.autoPages && typeof data.autoPages === 'object' ? data.autoPages : null;
      const autoLatest = autoPages ? Object.entries(autoPages).sort((a, b) => new Date(b[1].updated) - new Date(a[1].updated))[0] : null;
      const latestEntry = data.latestAutoPage && data.latestAutoPage.file ? data.latestAutoPage : autoLatest;

      if (!latestEntry) {
        latestContainer.style.display = 'none';
        return;
      }

      let latestFile;
      let latestData;
      if (Array.isArray(latestEntry)) {
        [latestFile, latestData] = latestEntry;
      } else {
        latestFile = latestEntry.file;
        latestData = { updated: latestEntry.updated };
      }

      latestContainer.style.display = 'block';
      latestContainer.innerHTML = `
        <div><strong>Latest uploaded UI:</strong> ${buildLabel(latestFile)}</div>
        <div>Updated: ${formatDateTime(latestData.updated)}</div>
        <button type="button" onclick="openUI('${latestFile}')">Open Latest UI</button>
      `;
    }

    // Load mockups from manifest.json
    async function loadMockups() {
      try {
        const response = await fetch('manifest.json');
        if (!response.ok) throw new Error('Failed to load manifest');

        const data = await response.json();
        const container = document.getElementById('uiOptions');
        container.innerHTML = '';

        renderPublishInfo(data);
        renderLatestUI(data);

        const pages = new Map();

        if (data.mockups && Array.isArray(data.mockups)) {
          data.mockups.forEach(mockup => {
            if (mockup.file === 'index.html') return;
            pages.set(mockup.file, { file: mockup.file, label: mockup.label || buildLabel(mockup.file) });
          });
        }

        if (data.autoPages && typeof data.autoPages === 'object') {
          Object.keys(data.autoPages).forEach(file => {
            if (file === 'index.html') return;
            if (!pages.has(file)) {
              pages.set(file, { file, label: buildLabel(file) });
            }
          });
        }

        if (!pages.size) {
          container.innerHTML = '<p style="color: #ff6b6b;">No UI pages found in manifest.json.</p>';
          return;
        }

        Array.from(pages.values())
          .sort((a, b) => a.label.localeCompare(b.label))
          .forEach(page => {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = `Open ${page.label} UI`;
            button.onclick = () => openUI(page.file);
            container.appendChild(button);
          });

        const reloadButton = document.createElement('button');
        reloadButton.type = 'button';
        reloadButton.textContent = 'Reload Selection Page';
        reloadButton.onclick = () => window.location.href = 'index.html';
        container.appendChild(reloadButton);

      } catch (error) {
        console.error('Error loading mockups:', error);
        document.getElementById('uiOptions').innerHTML = '<p style="color: #ff6b6b;">Error loading mockups. Please check manifest.json</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadMockups);
  </script>
</body>
</html>
